<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
	<title>Surfer2 · 5.40.00 专业冲浪器</title>
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }

		body {
			font-family: system-ui, 'Segoe UI', monospace;
			background: #0a0f1e;
			height: 100vh;
			display: flex;
			justify-content: center;
			align-items: center;
			padding: 16px;
			transition: background-color 0.35s ease, color 0.25s ease;
			margin: 0;
			position: relative;
			overflow: hidden;
		}
		body.high-contrast {
			background: #000000 !important;
			color: #ffffff !important;
		}
		body.high-contrast .surfer-container,
		body.high-contrast .internal-page,
		body.high-contrast .settings-group,
		body.high-contrast .calc-gui,
		body.high-contrast .toolbar,
		body.high-contrast .pin-item,
		body.high-contrast .page-card,
		body.high-contrast .feedback-item,
		body.high-contrast .chat-message {
			background: #000000 !important;
			border-color: #ffffff !important;
			color: #ffffff !important;
		}
		body.high-contrast button,
		body.high-contrast .calc-gui-btn,
		body.high-contrast .game-btn {
			background: #333333 !important;
			color: #ffffff !important;
			border: 1px solid #ffffff !important;
		}
		body.light-mode { background: #e2e8f0; }

		.surfer-container {
			width: 100%; max-width: 1400px; height: 90vh; background: #0e1427; border-radius: 32px;
			box-shadow: 0 25px 45px rgba(0,0,0,0.5); display: flex; flex-direction: column;
			overflow: hidden; border: 1px solid #2d3e5f; transition: all 0.2s;
			position: relative; z-index: 1;
		}
		.toolbar {
			background: #111927cc; backdrop-filter: blur(8px); padding: 8px 16px;
			border-bottom: 1px solid #2a3a55; display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
		}
		.nav-buttons { display: flex; gap: 6px; background: #0b101e99; padding: 4px 10px; border-radius: 48px; }
		.nav-btn { background: #1e2a3e; border: none; color: #b4d0ff; font-size: 1.2rem; width: 32px; height: 32px; border-radius: 40px; cursor: pointer; }
		.url-bar { flex: 1; display: flex; gap: 6px; background: #0b101e99; padding: 4px 12px; border-radius: 60px; align-items: center; }
		.url-input { flex: 1; background: #010a1a; border: 1px solid #2c5270; padding: 8px 14px; border-radius: 48px; color: #c0e0ff; font-size: 0.85rem; outline: none; }
		.go-btn { background: #1f6392; border: none; padding: 5px 14px; border-radius: 40px; color: white; cursor: pointer; }
		.status { font-size: 0.65rem; background: #030a17aa; padding: 3px 10px; border-radius: 20px; color: #87b9ff; }
		.boss-btn, .pin-btn, .hide-window-btn, .user-btn { background: #4a5568; border: none; padding: 4px 14px; border-radius: 32px; color: white; cursor: pointer; font-size: 0.8rem; }
		.boss-btn { background: #9e4a2c; }
		.pin-btn { background: #8b5cf6; }
		.user-btn { background: #22c55e; }
		.wave-area { flex: 1; position: relative; overflow: auto; }
		iframe { width: 100%; height: 100%; border: none; background: white; display: block; }
		.internal-page { width: 100%; min-height: 100%; background: #0f172a; color: #e2e8f0; padding: 20px; overflow-y: auto; }
		body.light-mode .internal-page { background: #f8fafc; color: #1e293b; }
		.settings-group { margin-bottom: 20px; padding: 12px; background: #1e293b; border-radius: 16px; }
		body.light-mode .settings-group { background: #ffffff; border: 1px solid #e2e8f0; }
		.color-wheel { width: 100%; height: 40px; margin-top: 8px; cursor: pointer; border-radius: 12px; border: 1px solid #475569; }

		/* 画板完整样式 */
		.paint-container {
			display: flex;
			flex-direction: column;
			height: 100%;
			min-height: 600px;
		}
		.paint-toolbar {
			display: flex;
			flex-wrap: wrap;
			gap: 8px;
			padding: 12px;
			background: #1e293b;
			border-radius: 20px;
			margin-bottom: 16px;
			align-items: center;
		}
		body.light-mode .paint-toolbar { background: #ffffff; border: 1px solid #e2e8f0; }
		.paint-canvas-area {
			flex: 1;
			overflow: auto;
			background: #2d3748;
			border-radius: 20px;
			position: relative;
			min-height: 500px;
		}
		.canvas-wrapper {
			position: relative;
			transform-origin: 0 0;
		}
		#mainCanvas {
			display: block;
			box-shadow: 0 4px 15px rgba(0,0,0,0.3);
			cursor: crosshair;
			background: white;
		}
		.paint-btn {
			background: #3b82f6;
			border: none;
			padding: 6px 12px;
			border-radius: 20px;
			color: white;
			cursor: pointer;
			font-size: 0.75rem;
		}
		.paint-btn.active { background: #22c55e; }
		.color-preview {
			width: 40px;
			height: 40px;
			border-radius: 50%;
			border: 2px solid white;
			cursor: pointer;
		}
		.board-selector {
			display: flex;
			gap: 8px;
			flex-wrap: wrap;
			margin-bottom: 12px;
		}
		.board-tab {
			background: #2d3748;
			padding: 4px 12px;
			border-radius: 20px;
			cursor: pointer;
		}
		.board-tab.active { background: #3b82f6; }

		.paint-tool-group {
			display: flex;
			gap: 4px;
			background: #0f172a;
			padding: 4px 8px;
			border-radius: 40px;
		}
		body.light-mode .paint-tool-group { background: #e2e8f0; }

		.color-mixer {
			display: flex;
			gap: 8px;
			align-items: center;
			background: #0f172a;
			padding: 4px 12px;
			border-radius: 40px;
		}
		.rgb-slider {
			width: 80px;
		}

		.user-menu {
			position: absolute;
			top: 60px;
			right: 20px;
			background: #1e293b;
			border-radius: 20px;
			padding: 12px;
			min-width: 220px;
			z-index: 200;
			display: none;
		}
		.user-menu.show { display: block; }
		.user-menu-item { padding: 8px 12px; cursor: pointer; border-radius: 12px; }
		.user-menu-item:hover { background: #2d3e5f; }
	</style>
</head>
<body>
	<div class="surfer-container">
		<div class="toolbar">
			<div class="nav-buttons"><button class="nav-btn" id="backBtn">◀</button><button class="nav-btn" id="forwardBtn">▶</button><button class="nav-btn" id="reloadBtn">⟳</button></div>
			<div class="url-bar"><input type="text" id="urlInput" class="url-input" placeholder="surfer:homepage / settings / paintboard" value="about:blank"><button id="goBtn" class="go-btn">冲浪</button></div>
			<button id="bossKeyBtn" class="boss-btn">🕹️ B</button>
			<button id="pinKeyBtn" class="pin-btn">📌 P</button>
			<button id="hideWindowBtn" class="hide-window-btn">🙈 隐藏</button>
			<button id="userBtn" class="user-btn">👤 登录</button>
			<div class="status" id="statusMsg">⚡ Surfer2 5.40.00</div>
		</div>
		<div class="wave-area" id="waveArea"><iframe id="surfFrame" src="about:blank" style="display:none;"></iframe><div id="internalContainer" style="width:100%;height:100%;overflow:auto;"></div></div>
	</div>
	<div id="userMenu" class="user-menu">
		<div id="userMenuName" style="text-align:center; font-weight:bold;"></div>
		<div class="user-menu-item" id="menuLogout">🚪 登出</div>
	</div>
	<script>
		(function(){
			const frame = document.getElementById('surfFrame');
			const internalContainer = document.getElementById('internalContainer');
			const urlInput = document.getElementById('urlInput');
			const goBtn = document.getElementById('goBtn');
			const backBtn = document.getElementById('backBtn');
			const forwardBtn = document.getElementById('forwardBtn');
			const reloadBtn = document.getElementById('reloadBtn');
			const statusSpan = document.getElementById('statusMsg');
			const bossBtn = document.getElementById('bossKeyBtn');
			const pinBtn = document.getElementById('pinKeyBtn');
			const hideBtn = document.getElementById('hideWindowBtn');
			const userBtn = document.getElementById('userBtn');
			const userMenu = document.getElementById('userMenu');
			let historyStack = [], historyIndex = -1;

			// 简单账号系统
			let currentUser = JSON.parse(localStorage.getItem('surfer2_user') || 'null');
			function login(){ const name = prompt("输入用户名:"); if(name){ currentUser = { username: name }; localStorage.setItem('surfer2_user', JSON.stringify(currentUser)); updateUserBtn(); } }
			function logout(){ currentUser = null; localStorage.removeItem('surfer2_user'); updateUserBtn(); }
			function updateUserBtn(){ userBtn.innerHTML = currentUser ? `👤 ${currentUser.username}` : '👤 登录'; }
			userBtn.onclick = () => { if(currentUser) userMenu.classList.toggle('show'); else login(); };
			document.getElementById('menuLogout').onclick = logout;
			updateUserBtn();

			// ========== 完整画板 ==========
			let paintBoards = JSON.parse(localStorage.getItem('surfer2_paintboards') || '[{"id":"default","name":"画板1","imageData":null,"history":[],"historyIndex":-1}]');
			let currentBoardId = localStorage.getItem('surfer2_currentBoard') || 'default';
			let currentTool = 'pen';
			let penColor = '#000000';
			let penSize = 5;
			let isDrawing = false;
			let lastX = 0, lastY = 0;
			let canvasCtx = null;
			let canvasWidth = 3000, canvasHeight = 3000;
			let viewX = 0, viewY = 0;
			let isErasing = false;
			let textBoxes = JSON.parse(localStorage.getItem('surfer2_textboxes') || '[]');
			let editingTextBox = null;
			let uploadedImage = null;
			let imageRotation = 0;
			let imageScale = 1;

			function savePaintBoards(){
				localStorage.setItem('surfer2_paintboards', JSON.stringify(paintBoards));
				localStorage.setItem('surfer2_textboxes', JSON.stringify(textBoxes));
			}

			function saveCurrentBoardState(){
				const board = paintBoards.find(b => b.id === currentBoardId);
				if(board && canvasCtx){
					board.imageData = document.getElementById('mainCanvas').toDataURL();
					if(board.historyIndex < board.history.length - 1){
						board.history = board.history.slice(0, board.historyIndex + 1);
					}
					board.history.push(board.imageData);
					board.historyIndex = board.history.length - 1;
					if(board.history.length > 50) board.history.shift();
					savePaintBoards();
				}
			}

			function loadImageToCanvas(imgData, callback){
				const img = new Image();
				img.onload = () => {
					canvasCtx.clearRect(0, 0, canvasWidth, canvasHeight);
					canvasCtx.drawImage(img, 0, 0, canvasWidth, canvasHeight);
					renderTextBoxes();
					if(callback) callback();
					saveCurrentBoardState();
				};
				img.src = imgData;
			}

			function undo(){
				const board = paintBoards.find(b => b.id === currentBoardId);
				if(board && board.historyIndex > 0){
					board.historyIndex--;
					loadImageToCanvas(board.history[board.historyIndex]);
				}
			}

			function redo(){
				const board = paintBoards.find(b => b.id === currentBoardId);
				if(board && board.historyIndex < board.history.length - 1){
					board.historyIndex++;
					loadImageToCanvas(board.history[board.historyIndex]);
				}
			}

			function clearCanvas(){
				if(confirm('确定清空整个画板吗？')){
					canvasCtx.fillStyle = '#ffffff';
					canvasCtx.fillRect(0, 0, canvasWidth, canvasHeight);
					saveCurrentBoardState();
				}
			}

			function renderTextBoxes(){
				textBoxes.forEach(box => {
					canvasCtx.save();
					canvasCtx.font = `${box.fontSize}px sans-serif`;
					canvasCtx.fillStyle = box.color;
					canvasCtx.fillText(box.text, box.x, box.y);
					canvasCtx.restore();
				});
			}

			function draw(e){
				if(!isDrawing) return;
				const rect = document.getElementById('mainCanvas').getBoundingClientRect();
				const scaleX = canvasWidth / rect.width;
				const scaleY = canvasHeight / rect.height;
				let clientX = e.clientX !== undefined ? e.clientX : e.touches?.[0]?.clientX;
				let clientY = e.clientY !== undefined ? e.clientY : e.touches?.[0]?.clientY;
				if(clientX === undefined) return;
				let x = (clientX - rect.left) * scaleX;
				let y = (clientY - rect.top) * scaleY;
				x = Math.max(0, Math.min(canvasWidth, x));
				y = Math.max(0, Math.min(canvasHeight, y));
				canvasCtx.beginPath();
				canvasCtx.lineCap = 'round';
				canvasCtx.lineJoin = 'round';
				if(currentTool === 'eraser' || isErasing){
					canvasCtx.strokeStyle = '#ffffff';
					canvasCtx.lineWidth = penSize * 2;
				} else {
					canvasCtx.strokeStyle = penColor;
					canvasCtx.lineWidth = penSize;
				}
				if(lastX === 0 && lastY === 0){
					canvasCtx.moveTo(x, y);
					canvasCtx.lineTo(x+0.5, y+0.5);
				} else {
					canvasCtx.moveTo(lastX, lastY);
					canvasCtx.lineTo(x, y);
				}
				canvasCtx.stroke();
				lastX = x;
				lastY = y;
			}

			function startDrawing(e){
				isDrawing = true;
				const rect = document.getElementById('mainCanvas').getBoundingClientRect();
				const scaleX = canvasWidth / rect.width;
				const scaleY = canvasHeight / rect.height;
				let clientX = e.clientX !== undefined ? e.clientX : e.touches?.[0]?.clientX;
				let clientY = e.clientY !== undefined ? e.clientY : e.touches?.[0]?.clientY;
				if(clientX === undefined) return;
				lastX = (clientX - rect.left) * scaleX;
				lastY = (clientY - rect.top) * scaleY;
				lastX = Math.max(0, Math.min(canvasWidth, lastX));
				lastY = Math.max(0, Math.min(canvasHeight, lastY));
				canvasCtx.beginPath();
				canvasCtx.moveTo(lastX, lastY);
			}

			function endDrawing(){
				isDrawing = false;
				lastX = 0; lastY = 0;
				saveCurrentBoardState();
			}

			function initCanvas(){
				const canvas = document.getElementById('mainCanvas');
				if(!canvas) return;
				canvas.width = canvasWidth;
				canvas.height = canvasHeight;
				canvasCtx = canvas.getContext('2d');
				const board = paintBoards.find(b => b.id === currentBoardId);
				if(board && board.imageData){
					const img = new Image();
					img.onload = () => { canvasCtx.drawImage(img, 0, 0); renderTextBoxes(); };
					img.src = board.imageData;
				} else {
					canvasCtx.fillStyle = '#ffffff';
					canvasCtx.fillRect(0, 0, canvasWidth, canvasHeight);
				}
				canvas.addEventListener('mousedown', startDrawing);
				canvas.addEventListener('mousemove', draw);
				canvas.addEventListener('mouseup', endDrawing);
				canvas.addEventListener('mouseleave', endDrawing);
				canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDrawing(e.touches[0]); });
				canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e.touches[0]); });
				canvas.addEventListener('touchend', endDrawing);
				
				// 文字框双击编辑
				canvas.addEventListener('dblclick', (e) => {
					const rect = canvas.getBoundingClientRect();
					const scaleX = canvasWidth / rect.width;
					const scaleY = canvasHeight / rect.height;
					let clientX = e.clientX;
					let clientY = e.clientY;
					const x = (clientX - rect.left) * scaleX;
					const y = (clientY - rect.top) * scaleY;
					for(let box of textBoxes){
						if(Math.abs(x - box.x) < 50 && Math.abs(y - box.y) < 30){
							const newText = prompt('编辑文字:', box.text);
							if(newText !== null) box.text = newText;
							savePaintBoards();
							loadImageToCanvas(paintBoards.find(b=>b.id===currentBoardId).imageData);
							break;
						}
					}
				});
			}

			function moveCanvas(dx, dy){
				const wrapper = document.querySelector('.canvas-wrapper');
				if(wrapper){
					viewX += dx;
					viewY += dy;
					wrapper.style.transform = `translate(${viewX}px, ${viewY}px)`;
				}
			}

			function uploadImage(file, rotate=0, scale=1){
				const reader = new FileReader();
				reader.onload = (e) => {
					const img = new Image();
					img.onload = () => {
						let w = img.width * scale;
						let h = img.height * scale;
						let x = (canvasWidth - w) / 2;
						let y = (canvasHeight - h) / 2;
						canvasCtx.save();
						canvasCtx.translate(x + w/2, y + h/2);
						canvasCtx.rotate(rotate * Math.PI / 180);
						canvasCtx.drawImage(img, -w/2, -h/2, w, h);
						canvasCtx.restore();
						saveCurrentBoardState();
					};
					img.src = e.target.result;
				};
				reader.readAsDataURL(file);
			}

			function addTextBox(){
				const id = Date.now();
				textBoxes.push({ id, x: 500, y: 500, text: '双击编辑', color: penColor, fontSize: 24 });
				savePaintBoards();
				loadImageToCanvas(paintBoards.find(b=>b.id===currentBoardId).imageData);
			}

			function exportCanvas(){
				const link = document.createElement('a');
				link.download = `surfer2_${currentBoardId}.png`;
				link.href = document.getElementById('mainCanvas').toDataURL();
				link.click();
			}

			function importCanvas(file){
				const reader = new FileReader();
				reader.onload = (e) => {
					const img = new Image();
					img.onload = () => {
						canvasCtx.drawImage(img, 0, 0, canvasWidth, canvasHeight);
						saveCurrentBoardState();
					};
					img.src = e.target.result;
				};
				reader.readAsDataURL(file);
			}

			function addNewBoard(){
				const name = prompt('新画板名称:');
				if(name){
					const newId = Date.now().toString();
					paintBoards.push({ id: newId, name, imageData: null, history: [], historyIndex: -1 });
					savePaintBoards();
					currentBoardId = newId;
					localStorage.setItem('surfer2_currentBoard', currentBoardId);
					renderPaintBoard();
					initCanvas();
					attachPaintEvents();
					renderBoardSelector();
				}
			}

			function renameBoard(){
				const board = paintBoards.find(b => b.id === currentBoardId);
				if(board){
					const newName = prompt('新名称:', board.name);
					if(newName) board.name = newName;
					savePaintBoards();
					renderBoardSelector();
				}
			}

			function renderBoardSelector(){
				const container = document.getElementById('boardSelector');
				if(!container) return;
				container.innerHTML = paintBoards.map(b => `<div class="board-tab ${b.id === currentBoardId ? 'active' : ''}" onclick="window.switchBoard('${b.id}')">${b.name}</div>`).join('');
			}

			window.switchBoard = (id) => {
				saveCurrentBoardState();
				currentBoardId = id;
				localStorage.setItem('surfer2_currentBoard', currentBoardId);
				renderPaintBoard();
				initCanvas();
				attachPaintEvents();
				renderBoardSelector();
				const board = paintBoards.find(b => b.id === currentBoardId);
				if(board && board.imageData){
					const img = new Image();
					img.onload = () => { canvasCtx.drawImage(img, 0, 0); renderTextBoxes(); };
					img.src = board.imageData;
				}
			};

			function attachPaintEvents(){
				const colorPicker = document.getElementById('penColorPicker');
				const colorR = document.getElementById('colorR');
				const colorG = document.getElementById('colorG');
				const colorB = document.getElementById('colorB');
				const sizeSlider = document.getElementById('penSizeSlider');
				const sizeLabel = document.getElementById('sizeLabel');
				const imgUpload = document.getElementById('imageUpload');
				const imgRotate = document.getElementById('imgRotate');
				const imgScale = document.getElementById('imgScale');
				const applyImageBtn = document.getElementById('applyImageBtn');
				
				if(colorPicker) colorPicker.onchange = (e) => { penColor = e.target.value; currentTool = 'pen'; isErasing = false; };
				if(colorR && colorG && colorB){
					const updateColor = () => {
						const r = parseInt(colorR.value);
						const g = parseInt(colorG.value);
						const b = parseInt(colorB.value);
						penColor = `rgb(${r},${g},${b})`;
						if(colorPicker) colorPicker.value = `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
					};
					colorR.oninput = updateColor;
					colorG.oninput = updateColor;
					colorB.oninput = updateColor;
				}
				if(sizeSlider){
					sizeSlider.oninput = (e) => { penSize = parseInt(e.target.value); if(sizeLabel) sizeLabel.innerText = `${penSize}px`; };
				}
				let selectedImageFile = null;
				if(imgUpload) imgUpload.onchange = (e) => { selectedImageFile = e.target.files[0]; };
				if(applyImageBtn) applyImageBtn.onclick = () => {
					if(selectedImageFile){
						let rot = imgRotate ? parseInt(imgRotate.value) : 0;
						let sc = imgScale ? parseFloat(imgScale.value) : 1;
						uploadImage(selectedImageFile, rot, sc);
					}
				};
			}

			function renderPaintBoard(){
				return `<div class="internal-page"><div class="paint-container">
					<div class="board-selector" id="boardSelector"></div>
					<div class="paint-toolbar">
						<div class="paint-tool-group">
							<button class="paint-btn ${currentTool==='pen'?'active':''}" onclick="window.setTool('pen')">✏️ 画笔</button>
							<button class="paint-btn ${currentTool==='eraser'?'active':''}" onclick="window.setTool('eraser')">🧽 橡皮</button>
							<button class="paint-btn" onclick="window.undo()">↩️ 撤销</button>
							<button class="paint-btn" onclick="window.redo()">↪️ 重做</button>
							<button class="paint-btn" onmousedown="window.clearCanvas()" oncontextmenu="return false;">🗑️ 清空(长按)</button>
						</div>
						<div class="color-mixer">
							<input type="color" id="penColorPicker" value="${penColor}" style="width:40px; height:40px; border-radius:50%; cursor:pointer;">
							<div style="display:flex; gap:4px;">
								<span>R</span><input type="range" id="colorR" min="0" max="255" value="0" class="rgb-slider">
								<span>G</span><input type="range" id="colorG" min="0" max="255" value="0" class="rgb-slider">
								<span>B</span><input type="range" id="colorB" min="0" max="255" value="0" class="rgb-slider">
							</div>
						</div>
						<div class="paint-tool-group">
							<input type="range" id="penSizeSlider" min="1" max="30" value="${penSize}" style="width:100px;">
							<span id="sizeLabel">${penSize}px</span>
						</div>
						<div class="paint-tool-group">
							<button class="paint-btn" onclick="window.moveCanvas(-50,0)">◀ 左移</button>
							<button class="paint-btn" onclick="window.moveCanvas(50,0)">右移 ▶</button>
							<button class="paint-btn" onclick="window.moveCanvas(0,-50)">▲ 上移</button>
							<button class="paint-btn" onclick="window.moveCanvas(0,50)">下移 ▼</button>
						</div>
						<div class="paint-tool-group">
							<input type="file" id="imageUpload" accept="image/*" style="display:none;">
							<button class="paint-btn" onclick="document.getElementById('imageUpload').click()">📷 上传图片</button>
							<input type="number" id="imgRotate" placeholder="旋转角度" value="0" style="width:60px;">
							<input type="number" id="imgScale" placeholder="缩放" value="1" step="0.1" style="width:60px;">
							<button class="paint-btn" id="applyImageBtn">✓ 应用</button>
						</div>
						<div class="paint-tool-group">
							<button class="paint-btn" onclick="window.addTextBox()">📝 文字框</button>
							<button class="paint-btn" onclick="window.exportCanvas()">💾 导出</button>
							<input type="file" id="importFile" accept="image/*" style="display:none;">
							<button class="paint-btn" onclick="document.getElementById('importFile').click()">📂 导入</button>
							<button class="paint-btn" onclick="window.addNewBoard()">➕ 新画板</button>
							<button class="paint-btn" onclick="window.renameBoard()">✏️ 重命名</button>
						</div>
					</div>
					<div class="paint-canvas-area" id="paintCanvasArea" style="overflow:auto; position:relative;">
						<div class="canvas-wrapper" style="transform:translate(${viewX}px, ${viewY}px);">
							<canvas id="mainCanvas" width="${canvasWidth}" height="${canvasHeight}" style="width:${canvasWidth/2}px; height:${canvasHeight/2}px;"></canvas>
						</div>
					</div>
				</div></div>`;
			}

			window.setTool = (tool) => { currentTool = tool; isErasing = (tool === 'eraser'); document.querySelectorAll('.paint-btn').forEach(btn => btn.classList.remove('active')); if(document.querySelector(`.paint-btn[onclick*="setTool('${tool}')"]`)) document.querySelector(`.paint-btn[onclick*="setTool('${tool}')"]`).classList.add('active'); };
			window.undo = undo;
			window.redo = redo;
			window.clearCanvas = clearCanvas;
			window.moveCanvas = moveCanvas;
			window.addTextBox = addTextBox;
			window.exportCanvas = exportCanvas;
			window.addNewBoard = addNewBoard;
			window.renameBoard = renameBoard;
			document.getElementById('importFile').onchange = (e) => { if(e.target.files[0]) importCanvas(e.target.files[0]); };

			// 设置页面
			function renderSettingsPage(){
				const savedBgImage = localStorage.getItem('surfer2_bgImage') || '';
				const lightMode = localStorage.getItem('surfer2_lightMode') === 'true';
				const highContrast = localStorage.getItem('surfer2_highContrast') === 'true';
				return `<div class="internal-page"><h2>⚙️ Surfer2 设置</h2>
				<div class="settings-group"><label><input type="checkbox" id="lightModeToggle" ${lightMode ? 'checked' : ''}> 浅色模式</label>
				<label><input type="checkbox" id="highContrastToggle" ${highContrast ? 'checked' : ''}> 高对比度</label></div>
				<div class="settings-group"><div>背景图片: <input type="text" id="bgImageUrl" value="${savedBgImage}" style="width:60%;"><input type="file" id="bgImageUpload" accept="image/*"></div>
				<button id="applyStyleBtn">应用样式</button></div>
				<div class="settings-group"><strong>版本信息</strong><div>Surfer2 5.40.00</div></div>
				<button id="saveAllBtn">保存</button></div>`;
			}

			function attachSettingsEvents(){
				const bgUpload = document.getElementById('bgImageUpload');
				if(bgUpload) bgUpload.onchange = (e) => { const f=e.target.files[0]; if(f){ const r=new FileReader(); r.onload=ev=>document.getElementById('bgImageUrl').value=ev.target.result; r.readAsDataURL(f); } };
				document.getElementById('applyStyleBtn').onclick = () => {
					const bgUrl = document.getElementById('bgImageUrl').value;
					localStorage.setItem('surfer2_bgImage', bgUrl);
					document.body.style.backgroundImage = bgUrl ? `url(${bgUrl})` : '';
					statusSpan.innerText = '样式已应用';
				};
				document.getElementById('saveAllBtn').onclick = () => {
					localStorage.setItem('surfer2_lightMode', document.getElementById('lightModeToggle').checked);
					localStorage.setItem('surfer2_highContrast', document.getElementById('highContrastToggle').checked);
					location.reload();
				};
			}

			function renderHomepage(){
				return `<div class="internal-page"><div style="text-align:center; padding:40px;">
					<h1 style="font-size:3rem;">🌊 Surfer2</h1>
					<p>快速搜索 · 内置导航 · 安全冲浪</p>
					<div style="margin-top:20px;"><input type="text" id="homeSearchInput" placeholder="输入搜索内容..." style="padding:12px; width:300px;"><button id="homeSearchBtn">搜索</button></div>
				</div></div>`;
			}

			function initHomepageEvents(){
				const btn = document.getElementById('homeSearchBtn');
				const input = document.getElementById('homeSearchInput');
				if(btn) btn.onclick = () => { if(input.value) navigateTo(`https://www.google.com/search?q=${encodeURIComponent(input.value)}`); };
			}

			function renderInternalPage(pageId){
				frame.style.display = 'none';
				internalContainer.style.display = 'block';
				internalContainer.innerHTML = '';
				if(pageId === 'homepage') internalContainer.innerHTML = renderHomepage(), setTimeout(initHomepageEvents, 50);
				else if(pageId === 'settings') internalContainer.innerHTML = renderSettingsPage(), attachSettingsEvents();
				else if(pageId === 'paintboard') internalContainer.innerHTML = renderPaintBoard(), setTimeout(()=>{ initCanvas(); attachPaintEvents(); renderBoardSelector(); }, 100);
				else internalContainer.innerHTML = `<div class="internal-page"><h2>❓ 未知域名</h2></div>`;
				statusSpan.innerText = `📄 ${pageId}`;
				urlInput.value = `surfer:${pageId}`;
			}

			function navigateTo(url){
				let target = url.trim();
				if(target.startsWith('surfer:')){
					const page = target.slice(7).split('?')[0];
					if(['homepage','settings','paintboard'].includes(page)){
						renderInternalPage(page);
						historyStack = historyStack.slice(0, historyIndex+1);
						historyStack.push(target);
						historyIndex++;
						urlInput.value = target;
						return;
					}
				}
				if(target === 'about:blank'){ frame.style.display='block'; internalContainer.style.display='none'; frame.src='about:blank'; historyStack=historyStack.slice(0,historyIndex+1); historyStack.push(target); historyIndex++; urlInput.value=target; return; }
				if(!target.startsWith('http')) target='https://'+target;
				frame.style.display='block'; internalContainer.style.display='none'; frame.src=target;
				historyStack = historyStack.slice(0,historyIndex+1); historyStack.push(target); historyIndex++; urlInput.value=target;
			}

			function goBack(){ if(historyIndex>0){ historyIndex--; navigateTo(historyStack[historyIndex]); } }
			function goForward(){ if(historyIndex<historyStack.length-1){ historyIndex++; navigateTo(historyStack[historyIndex]); } }
			function reloadCurrent(){ navigateTo(urlInput.value); }
			goBtn.onclick = () => navigateTo(urlInput.value);
			backBtn.onclick = goBack; forwardBtn.onclick = goForward; reloadBtn.onclick = reloadCurrent;
			urlInput.onkeypress = (e) => { if(e.key === 'Enter') navigateTo(urlInput.value); };
			bossBtn.onclick = () => navigateTo('surfer:settings');
			pinBtn.onclick = () => navigateTo('surfer:paintboard');
			document.addEventListener('keydown', (e) => { if(e.key === 'b' || e.key === 'B') { e.preventDefault(); navigateTo('surfer:settings'); } if(e.key === 'p' || e.key === 'P') { e.preventDefault(); navigateTo('surfer:paintboard'); } });
			let hidden=false; hideBtn.onclick = ()=>{ const c=document.querySelector('.surfer-container'); if(!hidden){ c.style.opacity='0'; c.style.visibility='hidden'; hidden=true; const restore=document.createElement('button'); restore.innerText='显示'; restore.style.cssText='position:fixed;bottom:20px;right:20px;z-index:10000;background:#3b82f6;border:none;padding:8px 16px;border-radius:40px;color:white;cursor:pointer'; restore.onclick=()=>{ c.style.opacity='1'; c.style.visibility='visible'; hidden=false; restore.remove(); }; document.body.appendChild(restore); } };
			
			// 加载保存的样式
			const savedBg = localStorage.getItem('surfer2_bgImage');
			if(savedBg) document.body.style.backgroundImage = `url(${savedBg})`;
			if(localStorage.getItem('surfer2_lightMode') === 'true') document.body.classList.add('light-mode');
			if(localStorage.getItem('surfer2_highContrast') === 'true') document.body.classList.add('high-contrast');
			
			navigateTo('surfer:homepage');
		})();
	</script>
</body>
  </html>
